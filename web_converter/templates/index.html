<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DeepSeek 转换器</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#2b6fcf">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #f0f4f8; padding: 16px; min-height: 100vh; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        h1 { font-size: 1.6rem; color: #2b6fcf; margin-bottom: 12px; text-align: center; }
        textarea { width: 100%; height: 220px; border: 1px solid #ccc; border-radius: 12px; padding: 12px; font-size: 16px; resize: vertical; }
        .row { display: flex; flex-wrap: wrap; gap: 10px; margin: 12px 0; align-items: center; }
        label { font-weight: bold; font-size: 0.9rem; }
        select { padding: 8px 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 0.9rem; flex: 1; }
        .btn { background: #2b6fcf; color: white; border: none; padding: 14px 20px; border-radius: 12px; font-size: 1.1rem; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        .btn:active { background: #1e4d8c; }
        .format-btns { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }
        .fbtn { padding: 10px 16px; border: 2px solid #2b6fcf; border-radius: 20px; background: white; color: #2b6fcf; font-weight: bold; }
        .fbtn.active { background: #2b6fcf; color: white; }
        #status { margin-top: 10px; color: #555; font-size: 0.9rem; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 格式转换器</h1>
        <textarea id="textInput" placeholder="粘贴 DeepSeek 生成的内容..."></textarea>

        <div class="row">
            <label>输入</label>
            <select id="inputMode">
                <option value="auto">自动检测</option>
                <option value="markdown">Markdown</option>
                <option value="html">HTML</option>
            </select>
        </div>

        <div class="row">
            <label>正文</label>
            <select id="bodyCn">
                {% for font in cn_fonts %}<option value="{{ font }}" {% if font == '宋体' %}selected{% endif %}>{{ font }}</option>{% endfor %}
            </select>
            <select id="bodyEn">
                {% for font in en_fonts %}<option value="{{ font }}" {% if font == 'Times New Roman' %}selected{% endif %}>{{ font }}</option>{% endfor %}
            </select>
        </div>
        <div class="row">
            <label>标题</label>
            <select id="headingCn">
                {% for font in cn_fonts %}<option value="{{ font }}" {% if font == '黑体' %}selected{% endif %}>{{ font }}</option>{% endfor %}
            </select>
            <select id="headingEn">
                {% for font in en_fonts %}<option value="{{ font }}" {% if font == 'Arial' %}selected{% endif %}>{{ font }}</option>{% endfor %}
            </select>
        </div>

        <div class="format-btns" id="outputFormat">
            <button class="fbtn active" data-fmt="docx">Word</button>
            <button class="fbtn" data-fmt="pdf">PDF</button>
            <button class="fbtn" data-fmt="latex">LaTeX</button>
            <button class="fbtn" data-fmt="html">HTML</button>
            <button class="fbtn" data-fmt="plain">纯文本</button>
        </div>

        <button class="btn" onclick="convert()">🚀 转换并下载</button>
        <div id="status"></div>
    </div>

    <script>
        let selectedFmt = 'docx';
        document.querySelectorAll('.fbtn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                selectedFmt = this.dataset.fmt;
            });
        });

        async function convert() {
            const status = document.getElementById('status');
            status.textContent = '正在转换...';
            const fd = new FormData();
            fd.append('text', document.getElementById('textInput').value);
            fd.append('input_mode', document.getElementById('inputMode').value);
            fd.append('output_fmt', selectedFmt);
            fd.append('body_cn', document.getElementById('bodyCn').value);
            fd.append('body_en', document.getElementById('bodyEn').value);
            fd.append('heading_cn', document.getElementById('headingCn').value);
            fd.append('heading_en', document.getElementById('headingEn').value);

            try {
                const resp = await fetch('/convert', { method: 'POST', body: fd });
                if (!resp.ok) {
                    const err = await resp.text();
                    throw new Error(err || '转换失败');
                }
                const blob = await resp.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'converted.' + selectedFmt;
                a.click();
                URL.revokeObjectURL(url);
                status.textContent = '下载完成！';
            } catch(e) {
                status.textContent = '错误: ' + e.message;
            }
        }
    </script>
</body>
</html>
